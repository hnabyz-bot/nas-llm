# Harness v4 Configuration
# Edit this file, then run `harness sync` to generate CC plugin files.

[project]
name = "nas-llm"
version = "1.0.0"
description = "LLM Wiki Knowledge Base — planning, ops scripts, and E2E checklist for the DESKTOP-AT1P1UD deployment of nashsu/llm_wiki"

[agent]
# default = "security-reviewer"

[env]
# CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"

[safety.permissions]
deny = [
  "Bash(sudo:*)",
]
ask = [
  "Bash(rm -r:*)",
  "Bash(git push --force:*)",
]

[safety.sandbox]
failIfUnavailable = false

[safety.sandbox.filesystem]
# denyRead = [".env", "secrets/**"]
# allowRead = [".env.example"]

